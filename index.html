<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMBER Uploader</title>
  <link rel="icon" href="./favicon.ico" />
  <script type="module" crossorigin src="./assets/index-D17X-175.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DIQbt17g.css">
</head>
<body>
  <main>
    <header class="site-header">
      <div class="brand">
        <img class="brand-logo" src="./assets/ember-logo-BRFrWvat.png" alt="EMBER Archive" />
        <div>
          <h1>EMBER Uploader</h1>
        </div>
      </div>
    </header>

    <section class="card" id="config-card">
      <h2>1 · Connection</h2>
      <form id="config-form">
      <div class="grid">
        <label>
          <span>DANDI instance</span>
          <select id="instance">
            <option value="dandi">DANDI (dandiarchive.org)</option>
            <option value="dandi-sandbox">DANDI Sandbox (sandbox.dandiarchive.org)</option>
            <option value="ember-dandi">EMBER-DANDI (dandi.emberarchive.org)</option>
            <option value="ember-dandi-sandbox">EMBER-DANDI Sandbox (dandi.sandbox.emberarchive.org)</option>
            <option value="custom">Custom…</option>
          </select>
        </label>
        <label id="custom-api-label" hidden>
          <span>Custom API base URL</span>
          <input type="url" id="custom-api" placeholder="https://api.example.org/api" spellcheck="false" />
        </label>
        <label>
          <span>API key
            <button type="button" class="hint" id="api-key-help" title="Where do I find this?">?</button>
          </span>
          <input type="password" id="api-key" placeholder="paste your DANDI API key" autocomplete="off" spellcheck="false" />
        </label>
        <label>
          <span>Dandiset ID</span>
          <input type="text" id="dandiset-id" placeholder="e.g. 000123 or DANDI:000123" spellcheck="false" />
        </label>
        <label>
          <span>Destination folder <em>(optional)</em></span>
          <input type="text" id="path-prefix" placeholder="e.g. videos/session1" spellcheck="false" />
        </label>
      </div>
      <div class="row">
        <label class="checkbox">
          <input type="checkbox" id="remember" checked />
          Remember settings in this browser (API key is stored in localStorage only)
        </label>
        <button id="connect-btn" type="submit" class="primary">Save &amp; test connection</button>
      </div>
      </form>
      <p id="connect-status" class="status" hidden></p>
      <p id="api-key-help-text" class="help" hidden>
        Log in at your DANDI instance, click your user initials in the top-right corner,
        and choose “API key”. The key is kept in this browser only and is sent solely to
        the API server selected above.
      </p>
    </section>

    <section class="card" id="drop-card">
      <h2>2 · Files</h2>
      <div id="dropzone" tabindex="0" role="button" aria-label="Drop .mp4 files here or click to browse">
        <div class="dz-inner">
          <div class="dz-icon">⬆️</div>
          <p><strong>Drop .mp4 files here</strong> or click to browse</p>
        </div>
        <input type="file" id="file-input" accept=".mp4,video/mp4" multiple hidden />
      </div>
      <ul id="file-list"></ul>
    </section>

  </main>

  <div class="page-footer-bar">
    <a
      id="version-indicator"
      class="version-link"
      href="https://github.com/brain-bbqs/ember-uploader"
      target="_blank"
      rel="noopener"
      title="View source on GitHub"
    ></a>
    <a
      class="con-brand-link"
      href="https://centerforopenneuroscience.org"
      target="_blank"
      rel="noopener"
      aria-label="Center for Open Neuroscience"
      title="Center for Open Neuroscience"
    >
      <img src="./assets/con-logo-F8_OuRqh.png" alt="Center for Open Neuroscience" />
    </a>
  </div>

  <video id="probe-video" preload="metadata" muted hidden></video>

</body>
</html>
