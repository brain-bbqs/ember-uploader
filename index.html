<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EMBER Uploader</title>
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <main>
      <header class="site-header">
        <div class="brand">
          <img class="brand-logo" src="/src/assets/ember-logo.png" alt="EMBER Archive" />
          <div>
            <h1>EMBER Uploader</h1>
          </div>
        </div>
        <div id="oauth-row" class="oauth-row">
          <button type="button" id="oauth-signin-btn" class="primary">Sign in with EMBER</button>
          <div id="oauth-signed-in" class="oauth-signed-in" hidden>
            <span id="oauth-avatar" class="oauth-avatar" tabindex="0" aria-label="Account menu"></span>
            <div class="oauth-popover" role="menu">
              <p class="oauth-popover-greeting">You are logged in as <strong id="oauth-username"></strong>.</p>
              <hr class="oauth-popover-divider" />
              <button type="button" id="oauth-signout-btn" class="oauth-popover-signout" role="menuitem">
                <span>Sign out</span>
                <svg
                  class="oauth-popover-signout-icon"
                  viewBox="0 0 24 24"
                  width="14"
                  height="14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </header>

      <section class="card" id="config-card">
        <h2>Dataset</h2>
        <form id="config-form">
          <div class="grid">
            <select id="dandiset-id">
              <option value="" selected disabled>Sign in to see your incoming datasets</option>
            </select>
            <p id="dandiset-single" class="dandiset-single" hidden>
              <span id="dandiset-single-text"></span>
              <a id="dandiset-single-link" class="dandiset-single-link" target="_blank" rel="noopener"
                >View in archive ↗</a
              >
            </p>
          </div>
        </form>
      </section>

      <section class="card" id="drop-card">
        <div id="progress-summary" class="progress-summary" hidden>
          <div class="progress-phase">
            <span class="progress-phase-label">Scanning</span>
            <div class="progress-summary-bar"><div id="progress-hash-fill"></div></div>
            <span id="progress-hash-text" class="progress-phase-stats progress-mono"></span>
          </div>
          <div class="progress-phase">
            <span class="progress-phase-label">Uploading</span>
            <div class="progress-summary-bar"><div id="progress-upload-fill"></div></div>
            <span id="progress-upload-text" class="progress-phase-stats progress-mono"></span>
          </div>
          <div class="progress-summary-footer">
            <span id="progress-footer-left"></span>
            <span id="progress-footer-mid"></span>
            <span id="progress-footer-right" class="progress-mono"></span>
          </div>
        </div>
        <div id="dropzone" tabindex="0" role="button" aria-label="Drop your research contents here, or click to browse">
          <div class="dz-inner">
            <div class="dz-icon">⬆️</div>
            <p>Drop your research contents here, or click to browse</p>
            <p class="dz-alt">
              or <button type="button" id="folder-picker-btn" class="linklike">select a folder</button>
            </p>
          </div>
          <input type="file" id="file-input" multiple hidden />
          <input type="file" id="folder-input" webkitdirectory multiple hidden />
        </div>
        <div id="upload-bar" class="upload-bar" hidden>
          <button type="button" id="upload-all-btn" class="primary">Upload</button>
          <button type="button" id="cancel-all-btn" hidden>Cancel</button>
          <a id="view-dataset-link" class="view-dataset-link" target="_blank" rel="noopener" hidden>View dataset ↗</a>
        </div>
        <div id="dest-root" class="dest-root" hidden>
          <code>sourcedata/raw/</code>
          <span class="expand-control">
            <label for="expand-depth">Expand depth</label>
            <input type="range" id="expand-depth" min="0" max="0" value="0" step="1" list="expand-depth-ticks" />
            <datalist id="expand-depth-ticks"></datalist>
            <span id="expand-depth-value">0</span>
          </span>
        </div>
        <ul id="file-list"></ul>
      </section>
    </main>

    <div class="page-footer-bar">
      <div class="footer-left">
        <a
          id="version-indicator"
          class="version-link"
          href="https://github.com/brain-bbqs/ember-uploader"
          target="_blank"
          rel="noopener"
          title="View source on GitHub"
        ></a>
        <button id="whats-new-button" class="whats-new-link" type="button">What's New</button>
      </div>
      <a
        class="con-brand-link"
        href="https://centerforopenneuroscience.org"
        target="_blank"
        rel="noopener"
        aria-label="Center for Open Neuroscience"
        title="Center for Open Neuroscience"
      >
        <img src="/src/assets/con-logo.png" alt="Center for Open Neuroscience" />
      </a>
    </div>

    <dialog id="whats-new-modal" class="whats-new-modal">
      <div class="whats-new-modal-header">
        <h2>What's New</h2>
        <button id="whats-new-close" class="whats-new-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="whats-new-content" class="whats-new-content"></div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
